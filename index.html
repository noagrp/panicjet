<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Benny's Panic Jet: Final Master</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #0f0; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; background: #010401; }
        #ui { position: absolute; bottom: 0; left: 0; width: 100%; pointer-events: none; z-index: 20; }
        .stat-box { background: rgba(0, 30, 0, 0.95); padding: 12px; border-top: 3px solid #0f0; display: flex; justify-content: space-around; align-items: center; font-size: 0.8em; text-transform: uppercase; flex-wrap: wrap; }
        .weapon-tag { color: #fff; background: #222; padding: 2px 6px; border-radius: 4px; margin: 0 3px; border: 1px solid #0f0; font-size: 0.65em; display: inline-block; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.5em; display: none; color: #fff; text-shadow: 0 0 20px #f00; z-index: 30; }
        #bootLog { position: absolute; top: 10px; left: 10px; font-size: 0.7em; color: #444; pointer-events: none; }
    </style>
</head>
<body>
    <div id="bootLog">SYSTEM: ARMED | AUDIO: DELAYED (5s)</div>
    <div id="msg">MAYDAY!</div>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div class="stat-box">
            <span>LIVES:<span id="lives">9</span> ULTS:<span id="ults">3</span> SHIELDS:<span id="shields">0</span>/3</span>
            <span>KILLS:<span id="kills">0</span> GUN:x<span id="gunLv">2</span></span>
            <div id="weaponSlots" style="width:100%; text-align:center; margin-top:5px;">WEAPONS: NONE</div>
        </div>
    </div>

<script>
// --- AUDIO (5S DELAY) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioAllowed = false;
setTimeout(() => { audioAllowed = true; document.getElementById('bootLog').style.color = "#0f0"; }, 5000);

function playSfx(type) {
    if (!audioAllowed || audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === 'laser') {
        osc.type = 'square'; osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
        gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(); osc.stop(now + 0.1);
    } else if (type === 'boom') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now);
        osc.frequency.linearRampToValueAtTime(40, now + 0.2);
        gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(); osc.stop(now + 0.2);
    } else if (type === 'ult') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(100, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.6);
        gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.6);
        osc.start(); osc.stop(now + 0.6);
    }
}

// --- ENGINE ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let gameScale = 1;
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; gameScale = (canvas.height > canvas.width) ? 0.6 : 1.0; }
window.addEventListener('resize', resize); resize();

const ENEMY_DEFS = {
    'peon':   { color: '#ffffff', speed: 2.0, shape: 'scout', weapon: 'std', label: 'Standard' },
    'bomber': { color: '#ff00ff', speed: 1.5, shape: 'titan', weapon: 'bolt', label: 'Heavy' },
    'sgt':    { color: '#00ffff', speed: 3.2, shape: 'viper', weapon: 'std', label: 'Interceptor' },
    'wiz':    { color: '#ffff00', speed: 2.2, shape: 'twin_boom', weapon: 'std', label: 'Dual-Core' },
    'hunt':   { color: '#ff8800', speed: 2.6, shape: 'phantom', weapon: 'rocket', label: 'Predator' }
};

let game = { score: 0, lives: 9, ults: 3, ultActive: false };
let player = { x: canvas.width/2, y: canvas.height-180, active: true, mainGunProj: 2, shields: 0, stolenWeapons: [], shootTimer: 0 };
let enemies = [], pBullets = [], eBullets = [], powerUps = [], stars = [];

for(let i=0; i<60; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1});

function drawFleet(x, y, color, scale, isEnemy, shape) {
    ctx.save(); ctx.translate(x, y); if (isEnemy) ctx.rotate(Math.PI);
    let finalScale = scale * gameScale; ctx.scale(finalScale, finalScale);
    const hull = isEnemy ? "#333" : "#444";
    const drawPart = (path, fill) => {
        ctx.fillStyle = fill; ctx.beginPath(); path(); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
    };
    if (shape === 'player') {
        drawPart(() => { ctx.moveTo(-50, 15); ctx.lineTo(0, -15); ctx.lineTo(50, 15); ctx.lineTo(15, 35); ctx.lineTo(-15, 35); }, color);
        drawPart(() => { ctx.moveTo(0, -50); ctx.lineTo(-12, 25); ctx.lineTo(12, 25); }, hull);
    } else {
        drawPart(() => { ctx.moveTo(-35, 10); ctx.lineTo(0, -25); ctx.lineTo(35, 10); ctx.lineTo(0, 20); }, color);
        drawPart(() => { ctx.moveTo(0, -15); ctx.lineTo(-8, 10); ctx.lineTo(8, 10); }, hull);
    }
    ctx.fillStyle = "rgba(0, 255, 255, 0.9)"; ctx.beginPath(); ctx.ellipse(0, -10, 4, 10, 0, 0, 7); ctx.fill();
    ctx.restore();
}

function triggerUltimate() {
    if (game.ults <= 0 || game.ultActive) return false;
    game.ults--; game.ultActive = true; playSfx('ult');
    enemies = []; eBullets = []; updateUI();
    setTimeout(() => { game.ultActive = false; }, 1000);
    return true;
}

function spawnSquad() {
    const keys = Object.keys(ENEMY_DEFS);
    const tk = keys[Math.floor(Math.random() * keys.length)];
    const area = Math.floor(Math.random() * 4);
    let sx, sy;
    if (area === 0) { sx = canvas.width * 0.2; sy = -100; }
    else if (area === 1) { sx = canvas.width * 0.8; sy = -100; }
    else if (area === 2) { sx = -100; sy = canvas.height * 0.2; }
    else { sx = canvas.width + 100; sy = canvas.height * 0.2; }
    for(let i=0; i<3; i++) enemies.push({ x: sx + (i*40), y: sy - (i*50), typeKey: tk, def: ENEMY_DEFS[tk], offset: Math.random()*100, area: area, shootTimer: Math.random()*80 });
}

function update() {
    ctx.fillStyle = game.ultActive ? "#0a2a0a" : "#010401"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => { s.y += s.s; if(s.y > canvas.height) s.y = 0; ctx.fillStyle = "white"; ctx.fillRect(s.x, s.y, 1, 1); });

    if (player.active) {
        if (player.shields > 0) { ctx.strokeStyle = "#0f0"; ctx.beginPath(); ctx.arc(player.x, player.y, 60*gameScale, 0, 7); ctx.stroke(); }
        drawFleet(player.x, player.y, '#0f0', 1, false, 'player');
        player.shootTimer++;
        if (player.shootTimer > 8) {
            playSfx('laser');
            const count = player.mainGunProj;
            const spread = 0.4; const step = spread / (count - 1);
            for(let i=0; i<count; i++) {
                let ang = -spread/2 + (step * i);
                pBullets.push({ x: player.x, y: player.y - 40, vx: Math.sin(ang)*18, vy: -Math.cos(ang)*18, color: '#fff', type: 'std' });
            }
            // Fire Stolen Weapons
            player.stolenWeapons.forEach(w => {
                pBullets.push({ x: player.x, y: player.y - 40, vx: 0, vy: -15, color: ENEMY_DEFS[w].color, type: ENEMY_DEFS[w].weapon });
            });
            player.shootTimer = 0;
        }
    }

    enemies.forEach((en, i) => {
        if (en.area <= 1) { en.y += en.def.speed; en.x += Math.sin(en.y / 50 + en.offset) * 2; }
        else if (en.area === 2) { en.x += en.def.speed; en.y += 1.2; }
        else { en.x -= en.def.speed; en.y += 1.2; }
        drawFleet(en.x, en.y, en.def.color, 1, true, en.def.shape);
        
        en.shootTimer++;
        if (en.shootTimer > 110) {
            eBullets.push({ x: en.x, y: en.y, vx: 0, vy: 6, color: en.def.color, type: en.def.weapon });
            en.shootTimer = 0;
        }
        if (player.active && Math.hypot(en.x - player.x, en.y - player.y) < 50 * gameScale) { 
            if(player.shields > 0) { player.shields--; enemies.splice(i, 1); playSfx('boom'); updateUI(); }
            else if (!triggerUltimate()) killPlayer();
        }
        if (en.y > canvas.height + 200 || en.x < -200 || en.x > canvas.width + 200) enemies.splice(i, 1);
    });

    powerUps.forEach((p, i) => {
        p.y += 2.5; 
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 20*gameScale, 0, 7); ctx.fill();
        ctx.strokeStyle = "white"; ctx.stroke();
        if (player.active && Math.hypot(p.x - player.x, p.y - player.y) < 60*gameScale) {
            if (player.stolenWeapons.length >= 3) player.stolenWeapons.shift();
            player.stolenWeapons.push(p.type); powerUps.splice(i, 1); updateUI();
        }
    });

    [pBullets, eBullets].forEach((arr, isP) => {
        for (let i = arr.length - 1; i >= 0; i--) {
            let b = arr[i]; b.x += b.vx || 0; b.y += (isP ? b.vy : -b.vy);
            ctx.shadowBlur = 10; ctx.shadowColor = b.color; ctx.fillStyle = b.color;
            if (b.type === 'bolt') { ctx.fillRect(b.x-4, b.y, 8, 20); }
            else if (b.type === 'rocket') { ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, 7); ctx.fill(); }
            else { ctx.fillRect(b.x-2, b.y, 4, 12); }
            ctx.shadowBlur = 0;

            if (!isP) { // Player Bullets
                enemies.forEach((en, ei) => {
                    if (Math.hypot(b.x - en.x, b.y - en.y) < 40 * gameScale) {
                        game.score++; arr.splice(i, 1); playSfx('boom');
                        if(game.score % 20 === 0) { 
                            if(player.shields < 3) player.shields++; 
                            if(player.mainGunProj < 6) player.mainGunProj++; 
                            powerUps.push({x: en.x, y: en.y, type: en.typeKey, color: en.def.color});
                        }
                        enemies.splice(ei, 1); updateUI();
                    }
                });
            } else if (player.active && Math.hypot(b.x - player.x, b.y - player.y) < 30 * gameScale) {
                if(player.shields > 0) { player.shields--; arr.splice(i, 1); playSfx('boom'); updateUI(); }
                else if (!triggerUltimate()) { killPlayer(); arr.splice(i, 1); }
                else arr.splice(i, 1);
            }
            if (b.y < -100 || b.y > canvas.height + 100 || b.x < -100 || b.x > canvas.width + 100) arr.splice(i, 1);
        }
    });
    requestAnimationFrame(update);
}

const h = (e) => { if(audioCtx.state==='suspended') audioCtx.resume(); const r=canvas.getBoundingClientRect(); player.x=(e.touches?e.touches[0].clientX:e.clientX)-r.left; player.y=(e.touches?e.touches[0].clientY:e.clientY)-r.top; };
window.addEventListener('mousemove', h); window.addEventListener('touchmove', (e)=>{e.preventDefault(); h(e);}, {passive:false});
function killPlayer() { player.active = false; game.lives--; playSfx('boom'); updateUI(); document.getElementById('msg').style.display = 'block'; setTimeout(() => { player.active = true; document.getElementById('msg').style.display = 'none'; }, 2000); if(game.lives<=0)location.reload(); }
function updateUI() { document.getElementById('lives').innerText = game.lives; document.getElementById('ults').innerText = game.ults; document.getElementById('shields').innerText = player.shields; document.getElementById('kills').innerText = game.score; document.getElementById('gunLv').innerText = player.mainGunProj; document.getElementById('weaponSlots').innerHTML = "WEAPONS: " + (player.stolenWeapons.map(w => `<span class="weapon-tag">${ENEMY_DEFS[w].label}</span>`).join("")); }
setInterval(() => { if (enemies.length < 15) spawnSquad(); }, 1200);
updateUI(); update();
</script>
</body>
</html>
